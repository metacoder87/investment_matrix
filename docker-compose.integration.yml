x-backend-env: &backend-env
  DATABASE_URL: postgresql+psycopg2://user:pass@db:5432/cryptoinsight
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  SECRET_KEY: ""
  ENCRYPTION_KEY: ""
  AUTO_IMPORT_ENABLED: "false"
  PAPER_SCHEDULER_ENABLED: "false"
  CORE_UNIVERSE: "BTC-USD"
  STREAM_EXCHANGE: "COINBASE"
  STREAM_EXCHANGES: ""
  STREAM_MAX_SYMBOLS_PER_EXCHANGE: "1"
  TRACK_TOP_N_COINS: "5"

services:
  redis:
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    environment:
      <<: *backend-env

  api:
    environment:
      <<: *backend-env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  worker:
    environment:
      <<: *backend-env

  beat:
    environment:
      <<: *backend-env

  streamer:
    environment:
      <<: *backend-env

  writer:
    environment:
      <<: *backend-env

  frontend:
    command: >
      sh -c "npm run build && npm run start -- --hostname 0.0.0.0 --port 3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
