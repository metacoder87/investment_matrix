services:
  redis:
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    environment:
      AUTO_IMPORT_ENABLED: "false"
      PAPER_SCHEDULER_ENABLED: "false"
      CORE_UNIVERSE: "BTC-USD"
      STREAM_EXCHANGE: "COINBASE"
      STREAM_EXCHANGES: ""
      STREAM_MAX_SYMBOLS_PER_EXCHANGE: "1"
      TRACK_TOP_N_COINS: "5"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  worker:
    environment:
      AUTO_IMPORT_ENABLED: "false"
      PAPER_SCHEDULER_ENABLED: "false"
      CORE_UNIVERSE: "BTC-USD"
      STREAM_EXCHANGE: "COINBASE"
      STREAM_EXCHANGES: ""
      STREAM_MAX_SYMBOLS_PER_EXCHANGE: "1"
      TRACK_TOP_N_COINS: "5"

  beat:
    environment:
      AUTO_IMPORT_ENABLED: "false"
      PAPER_SCHEDULER_ENABLED: "false"
      CORE_UNIVERSE: "BTC-USD"
      STREAM_EXCHANGE: "COINBASE"
      STREAM_EXCHANGES: ""
      STREAM_MAX_SYMBOLS_PER_EXCHANGE: "1"
      TRACK_TOP_N_COINS: "5"

  streamer:
    environment:
      AUTO_IMPORT_ENABLED: "false"
      PAPER_SCHEDULER_ENABLED: "false"
      CORE_UNIVERSE: "BTC-USD"
      STREAM_EXCHANGE: "COINBASE"
      STREAM_EXCHANGES: ""
      STREAM_MAX_SYMBOLS_PER_EXCHANGE: "1"
      TRACK_TOP_N_COINS: "5"

  writer:
    environment:
      AUTO_IMPORT_ENABLED: "false"
      PAPER_SCHEDULER_ENABLED: "false"
      CORE_UNIVERSE: "BTC-USD"
      STREAM_EXCHANGE: "COINBASE"
      STREAM_EXCHANGES: ""
      STREAM_MAX_SYMBOLS_PER_EXCHANGE: "1"
      TRACK_TOP_N_COINS: "5"

  frontend:
    command: >
      sh -c "npm run build && npm run start -- --hostname 0.0.0.0 --port 3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
