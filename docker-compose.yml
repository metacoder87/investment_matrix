x-backend-env: &backend-env
  DATABASE_URL: postgresql+psycopg2://user:pass@db:5432/cryptoinsight
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  PRIMARY_EXCHANGE: ${PRIMARY_EXCHANGE:-kraken}
  CORE_UNIVERSE: ${CORE_UNIVERSE:-BTC-USD,ETH-USD,SOL-USD}
  TRACK_TOP_N_COINS: ${TRACK_TOP_N_COINS:-50}
  STREAM_EXCHANGE: ${STREAM_EXCHANGE:-KRAKEN}
  STREAM_EXCHANGES: ${STREAM_EXCHANGES:-KRAKEN}
  STREAM_DYNAMIC_ENABLED: ${STREAM_DYNAMIC_ENABLED:-true}
  STREAM_REBALANCE_SECONDS: ${STREAM_REBALANCE_SECONDS:-60}
  STREAM_SOURCE_PRIORITY: ${STREAM_SOURCE_PRIORITY:-kraken,coinbase,binance,okx,bybit,kucoin,gateio,bitfinex,cryptocom,gemini,bitstamp}
  STREAM_MAX_SYMBOLS_PER_EXCHANGE: ${STREAM_MAX_SYMBOLS_PER_EXCHANGE:-25}
  STREAM_MAX_CONNECTIONS_PER_SOURCE: ${STREAM_MAX_CONNECTIONS_PER_SOURCE:-1}
  STREAM_MAX_MESSAGES_PER_SECOND_PER_SOURCE: ${STREAM_MAX_MESSAGES_PER_SECOND_PER_SOURCE:-250}
  STREAM_REDIS_MAX_PENDING: ${STREAM_REDIS_MAX_PENDING:-50000}
  STREAM_WRITER_MAX_LAG_SECONDS: ${STREAM_WRITER_MAX_LAG_SECONDS:-120}
  STREAM_DB_PRESSURE_HIGH_WATERMARK: ${STREAM_DB_PRESSURE_HIGH_WATERMARK:-0.80}
  INGEST_CAPACITY_MONITOR_SECONDS: ${INGEST_CAPACITY_MONITOR_SECONDS:-60}
  TIER2_REST_GAP_FILL_ENABLED: ${TIER2_REST_GAP_FILL_ENABLED:-true}
  TIER2_REST_GAP_FILL_SECONDS: ${TIER2_REST_GAP_FILL_SECONDS:-300}
  STREAM_USER_LOCKED_SYMBOLS: ${STREAM_USER_LOCKED_SYMBOLS:-}
  STREAM_USER_BLOCKED_SYMBOLS: ${STREAM_USER_BLOCKED_SYMBOLS:-}
  PRICE_EXCHANGE_PRIORITY: ${PRICE_EXCHANGE_PRIORITY:-kraken,coinbase,binance}
  MARKET_UNIVERSE_TARGET: ${MARKET_UNIVERSE_TARGET:-750}
  MARKET_DEFAULT_PAGE_SIZE: ${MARKET_DEFAULT_PAGE_SIZE:-500}
  KRAKEN_BACKFILL_BATCH_SIZE: ${KRAKEN_BACKFILL_BATCH_SIZE:-50}
  KRAKEN_BACKFILL_MAX_ACTIVE: ${KRAKEN_BACKFILL_MAX_ACTIVE:-8}
  KRAKEN_STREAM_TOP_N: ${KRAKEN_STREAM_TOP_N:-100}
  DEX_INGEST_ENABLED: ${DEX_INGEST_ENABLED:-true}
  DEX_CONTEXT_REFRESH_SECONDS: ${DEX_CONTEXT_REFRESH_SECONDS:-900}
  ONCHAIN_RPC_URLS: ${ONCHAIN_RPC_URLS:-}
  MARKET_ACTIVATION_ENABLED: ${MARKET_ACTIVATION_ENABLED:-true}
  MARKET_ACTIVATION_INTERVAL_SECONDS: ${MARKET_ACTIVATION_INTERVAL_SECONDS:-600}
  MARKET_ACTIVATION_BATCH_SIZE: ${MARKET_ACTIVATION_BATCH_SIZE:-5000}
  MARKET_ACTIVATION_QUEUE_LIMIT: ${MARKET_ACTIVATION_QUEUE_LIMIT:-200}
  MARKET_ACTIVATION_BACKFILL_DAYS: ${MARKET_ACTIVATION_BACKFILL_DAYS:-7}
  MARKET_ACTIVATION_TIMEFRAME: ${MARKET_ACTIVATION_TIMEFRAME:-1m}
  KRAKEN_API_KEY: ${KRAKEN_API_KEY:-}
  KRAKEN_API_SECRET: ${KRAKEN_API_SECRET:-}
  CREW_ENABLED: ${CREW_ENABLED:-true}
  CREW_LLM_PROVIDER: ${CREW_LLM_PROVIDER:-ollama}
  CREW_LLM_BASE_URL: ${CREW_LLM_BASE_URL:-http://host.docker.internal:11434}
  CREW_LLM_MODEL: ${CREW_LLM_MODEL:-llama3.3:70b}
  CREW_MAX_SYMBOLS_PER_RUN: ${CREW_MAX_SYMBOLS_PER_RUN:-10}
  CREW_LLM_TIMEOUT_SECONDS: ${CREW_LLM_TIMEOUT_SECONDS:-600}
  CREW_RESEARCH_ENABLED: ${CREW_RESEARCH_ENABLED:-true}
  CREW_TRIGGER_MONITOR_ENABLED: ${CREW_TRIGGER_MONITOR_ENABLED:-true}
  CREW_RESEARCH_INTERVAL_SECONDS: ${CREW_RESEARCH_INTERVAL_SECONDS:-1800}
  CREW_TRIGGER_POLL_SECONDS: ${CREW_TRIGGER_POLL_SECONDS:-5}
  CREW_FORMULA_LEARNING_INTERVAL_SECONDS: ${CREW_FORMULA_LEARNING_INTERVAL_SECONDS:-3600}
  CREW_BANKROLL_RESET_DRAWDOWN_PCT: ${CREW_BANKROLL_RESET_DRAWDOWN_PCT:-0.95}
  CREW_DEFAULT_STARTING_BANKROLL: ${CREW_DEFAULT_STARTING_BANKROLL:-10000}

services:
  db:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_DB: cryptoinsight
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d cryptoinsight" ]
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  migrate:
    build: .
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head"
  api:
    build: .
    environment:
      <<: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  worker:
    build: .
    environment:
      <<: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/code
    command: >
      sh -c "celery -A celery_app worker --loglevel=info"
  beat:
    build: .
    environment:
      <<: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "celery -A celery_app beat --loglevel=info"
  streamer:
    build: .
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python -m app.streamer"
  writer:
    build: .
    environment:
      <<: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python -m app.writer"
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        INTERNAL_API_URL: http://api:8000/api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: /api
      INTERNAL_API_URL: http://api:8000/api
    depends_on:
      - api

volumes:
  db_data:
